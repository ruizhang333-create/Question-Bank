<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 8 在线题库</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --bg: #f5efe4;
            --card: #fffdfa;
            --ink: #1f2937;
            --muted: #6b7280;
            --line: #e5dccd;
            --accent: #b45309;
            --accent-2: #7c2d12;
            --accent-soft: #fff2df;
            --ok: #166534;
            --ok-bg: #dcfce7;
            --bad: #991b1b;
            --bad-bg: #fee2e2;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
            background:
                radial-gradient(circle at top left, rgba(180, 83, 9, 0.12), transparent 25%),
                linear-gradient(180deg, #f8f4ec 0%, #efe7d8 100%);
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 24px 16px 56px;
        }

        .hero, .panel, .card {
            background: rgba(255, 253, 250, 0.95);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.06);
        }

        .hero {
            padding: 24px;
            background: linear-gradient(135deg, rgba(180, 83, 9, 0.14), rgba(255,255,255,0.96));
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.05;
        }

        .hero p, .hint, .muted {
            margin: 0;
            color: var(--muted);
        }

        .panel {
            margin-top: 18px;
            padding: 18px;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 0.95rem;
            color: var(--accent-2);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip, .btn {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 9px 14px;
            background: white;
            color: var(--ink);
            cursor: pointer;
            transition: 0.18s ease;
        }

        .chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent-soft);
            border-color: #edc285;
        }

        .btn.primary {
            background: var(--accent-2);
            color: white;
            border-color: var(--accent-2);
        }

        .toolbar {
            display: grid;
            gap: 14px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            margin-top: 14px;
        }

        .stat {
            background: white;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px 14px;
        }

        .stat .label {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .stat .value {
            margin-top: 6px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .card {
            margin-top: 22px;
            padding: 22px;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            background: #fff7ed;
            color: var(--accent-2);
            border: 1px solid #f8d2a3;
            font-size: 0.82rem;
        }

        .question {
            font-size: 1.08rem;
            line-height: 1.85;
            margin: 0 0 14px;
        }

        .image-wrap {
            display: grid;
            gap: 12px;
            margin: 14px 0 18px;
        }

        .image-wrap img {
            width: 100%;
            max-height: 480px;
            object-fit: contain;
            background: white;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 8px;
        }

        .option-list {
            display: grid;
            gap: 10px;
            margin-top: 16px;
        }

        .option {
            display: block;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background: white;
            cursor: pointer;
        }

        .option.correct {
            background: var(--ok-bg);
            border-color: #86efac;
            color: var(--ok);
            font-weight: 700;
        }

        .option.wrong {
            background: var(--bad-bg);
            border-color: #fca5a5;
            color: var(--bad);
            font-weight: 700;
        }

        .option.dimmed { opacity: 0.84; }
        .option input { margin-right: 10px; }

        .feedback {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            display: none;
        }

        .feedback.show { display: block; }
        .feedback.ok {
            background: var(--ok-bg);
            color: var(--ok);
            border: 1px solid #86efac;
        }
        .feedback.bad {
            background: var(--bad-bg);
            color: var(--bad);
            border: 1px solid #fca5a5;
        }

        .foot {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
        }

        .link-btn {
            color: var(--accent-2);
            text-decoration: none;
            font-size: 0.92rem;
        }

        .empty, .error {
            margin-top: 22px;
            padding: 20px;
            border-radius: 18px;
            background: white;
            border: 1px solid var(--line);
        }

        @media (max-width: 720px) {
            .hero, .panel, .card { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="hero">
            <h1>AMC 8 在线题库</h1>
            <p>一次只显示一道题。学生提交当前题后，立即看到正误，再进入下一题。</p>
        </section>

        <section class="panel">
            <div class="toolbar">
                <div>
                    <div class="section-title">模块筛选</div>
                    <div class="chips" id="module-chips"></div>
                </div>
                <div>
                    <div class="section-title">年份筛选</div>
                    <div class="chips" id="year-chips"></div>
                </div>
                <div class="actions">
                    <button class="btn" id="restart-btn">重新开始当前筛选</button>
                    <button class="btn" id="random-btn">随机当前筛选顺序</button>
                    <button class="btn primary" id="next-btn" disabled>下一题</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="label">当前进度</div>
                    <div class="value" id="progress-stat">0 / 0</div>
                </div>
                <div class="stat">
                    <div class="label">已答题数</div>
                    <div class="value" id="answered-stat">0</div>
                </div>
                <div class="stat">
                    <div class="label">答对题数</div>
                    <div class="value" id="correct-stat">0</div>
                </div>
                <div class="stat">
                    <div class="label">正确率</div>
                    <div class="value" id="rate-stat">0%</div>
                </div>
            </div>

            <p class="hint" style="margin-top:14px;">说明：已尽量清洗题干中的视频与解析残留。含外部图片的题会直接显示图片；`Asy` 绘制的图形暂时无法直接渲染时，会保留原题链接作为补充。</p>
        </section>

        <main id="app"></main>
    </div>

    <script>
        const state = {
            all: [],
            filtered: [],
            module: "全部",
            year: "全部",
            order: [],
            index: 0,
            answers: {},
            graded: {},
            shuffled: false,
        };

        const app = document.getElementById("app");
        const progressStat = document.getElementById("progress-stat");
        const answeredStat = document.getElementById("answered-stat");
        const correctStat = document.getElementById("correct-stat");
        const rateStat = document.getElementById("rate-stat");

        function renderMath() {
            if (!window.renderMathInElement) return;
            renderMathInElement(document.body, {
                delimiters: [
                    { left: "\\(", right: "\\)", display: false },
                    { left: "\\[", right: "\\]", display: true },
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false }
                ],
                throwOnError: false
            });
        }

        async function init() {
            try {
                const response = await fetch(`./amc8_quiz_data.json?v=${Date.now()}`);
                if (!response.ok) throw new Error(`题库加载失败（HTTP ${response.status}）`);
                state.all = await response.json();
                buildFilterChips();
                resetSequence();
            } catch (error) {
                app.innerHTML = `<div class="error"><strong>页面加载失败：</strong>${error.message}</div>`;
            }
        }

        function buildFilterChips() {
            const modules = ["全部", ...new Set(state.all.map(item => item.module).filter(Boolean))];
            const years = ["全部", ...new Set(state.all.map(item => item.year).filter(Boolean))].sort((a, b) => {
                if (a === "全部") return -1;
                if (b === "全部") return 1;
                return Number(a) - Number(b);
            });

            renderChips(document.getElementById("module-chips"), modules, state.module, (value) => {
                state.module = value;
                resetSequence();
            });

            renderChips(document.getElementById("year-chips"), years, state.year, (value) => {
                state.year = value;
                resetSequence();
            });
        }

        function renderChips(container, values, activeValue, onSelect) {
            container.innerHTML = "";
            values.forEach((value) => {
                const button = document.createElement("button");
                button.className = `chip ${value === activeValue ? "active" : ""}`;
                button.textContent = value;
                button.addEventListener("click", () => onSelect(value));
                container.appendChild(button);
            });
        }

        function applyFilters() {
            state.filtered = state.all.filter((item) => {
                const modulePass = state.module === "全部" || item.module === state.module;
                const yearPass = state.year === "全部" || item.year === state.year;
                return modulePass && yearPass;
            });
        }

        function resetSequence() {
            applyFilters();
            state.order = state.filtered.map((_, i) => i);
            if (state.shuffled) shuffleOrder();
            state.index = 0;
            state.answers = {};
            state.graded = {};
            updateStats();
            renderCurrentQuestion();
            buildFilterChips();
        }

        function shuffleOrder() {
            for (let i = state.order.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
            }
        }

        function currentItem() {
            if (!state.filtered.length) return null;
            const idx = state.order[state.index];
            return state.filtered[idx];
        }

        function normalizedOptions(item) {
            return item.options && item.options.length === 5
                ? item.options
                : ["A", "B", "C", "D", "E"].map((label) => ({ label, text: `(${label})` }));
        }

        function questionId(item) {
            return `${item.year}-${item.problem}`;
        }

        function renderCurrentQuestion() {
            const item = currentItem();
            if (!item) {
                app.innerHTML = `<div class="empty">当前筛选下没有题目。</div>`;
                document.getElementById("next-btn").disabled = true;
                return;
            }

            const qid = questionId(item);
            const selected = state.answers[qid] || "";
            const graded = !!state.graded[qid];
            const options = normalizedOptions(item);
            const images = item.images || [];

            app.innerHTML = `
                <section class="card">
                    <div class="badges">
                        <span class="badge">${state.index + 1} / ${state.filtered.length}</span>
                        <span class="badge">${item.year} AMC 8 P${item.problem}</span>
                        <span class="badge">${item.module}</span>
                        <span class="badge">${item.submodule}</span>
                        <span class="badge">${item.difficulty}</span>
                    </div>
                    <p class="question">${item.content || "题干暂未成功解析，请查看原题链接。"}</p>
                    ${images.length ? `<div class="image-wrap">${images.map((img) => `<img src="${img.url}" alt="${img.name}" loading="lazy" referrerpolicy="no-referrer">`).join("")}</div>` : ""}
                    ${item.has_figure && !images.length ? `<p class="muted">本题包含图形，但该图形不是直接图片资源，暂时无法内嵌显示。</p>` : ""}
                    <div class="option-list">
                        ${options.map((option) => `
                            <label class="option" data-label="${option.label}">
                                <input type="radio" name="answer" value="${option.label}" ${selected === option.label ? "checked" : ""} ${graded ? "disabled" : ""}>
                                <span>${option.text}</span>
                            </label>
                        `).join("")}
                    </div>
                    <div class="feedback" id="feedback"></div>
                    <div class="foot">
                        <button class="btn primary" id="submit-btn" ${graded ? "disabled" : ""}>提交本题</button>
                        <a class="link-btn" href="${item.source_url}" target="_blank" rel="noreferrer">查看 AoPS 原题</a>
                    </div>
                </section>
            `;

            document.getElementById("submit-btn").addEventListener("click", submitCurrent);
            document.querySelectorAll('input[name="answer"]').forEach((input) => {
                input.addEventListener("change", (event) => {
                    state.answers[qid] = event.target.value;
                });
            });

            if (graded) {
                paintResult(item);
            }

            document.getElementById("next-btn").disabled = !graded || state.index >= state.filtered.length - 1;
            renderMath();
        }

        function submitCurrent() {
            const item = currentItem();
            if (!item) return;
            const qid = questionId(item);
            if (!state.answers[qid]) {
                showFeedback("还没有选择答案。", false);
                return;
            }
            state.graded[qid] = true;
            paintResult(item);
            updateStats();
            document.getElementById("next-btn").disabled = state.index >= state.filtered.length - 1;
        }

        function paintResult(item) {
            const qid = questionId(item);
            const selected = state.answers[qid];
            const correct = item.answer;
            document.querySelectorAll(".option").forEach((label) => {
                const value = label.getAttribute("data-label");
                label.classList.remove("correct", "wrong", "dimmed");
                if (value === correct) label.classList.add("correct");
                else if (value === selected) label.classList.add("wrong");
                else label.classList.add("dimmed");
            });
            showFeedback(
                selected === correct
                    ? `回答正确。标准答案：${correct}`
                    : `回答错误。你的答案：${selected}；标准答案：${correct}`,
                selected === correct
            );
            const submit = document.getElementById("submit-btn");
            if (submit) submit.disabled = true;
        }

        function showFeedback(text, ok) {
            const box = document.getElementById("feedback");
            box.textContent = text;
            box.className = `feedback show ${ok ? "ok" : "bad"}`;
        }

        function updateStats() {
            const total = state.filtered.length;
            const answered = state.filtered.filter((item) => state.graded[questionId(item)]).length;
            const correct = state.filtered.filter((item) => state.graded[questionId(item)] && state.answers[questionId(item)] === item.answer).length;
            progressStat.textContent = total ? `${Math.min(state.index + 1, total)} / ${total}` : "0 / 0";
            answeredStat.textContent = answered;
            correctStat.textContent = correct;
            rateStat.textContent = answered ? `${Math.round((correct / answered) * 100)}%` : "0%";
        }

        document.getElementById("next-btn").addEventListener("click", () => {
            if (state.index < state.filtered.length - 1) {
                state.index += 1;
                renderCurrentQuestion();
                updateStats();
            }
        });

        document.getElementById("restart-btn").addEventListener("click", () => {
            state.shuffled = false;
            resetSequence();
        });

        document.getElementById("random-btn").addEventListener("click", () => {
            state.shuffled = true;
            resetSequence();
        });

        init();
    </script>
</body>
</html>
